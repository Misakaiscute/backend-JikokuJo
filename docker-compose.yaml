services:
  app:
    image: local/jikokujo
    container_name: app
    build:
      context: ./
      dockerfile: docker-compose/laravel/main/Dockerfile
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "mysql -h database -u root --skip-ssl jikokujo -e 'SELECT 1 FROM cache LIMIT 1' 2>/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 120
      start_period: 120s
    environment:
      DB_HOST: ${DB_HOST}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REVERB_APP_ID: ${REVERB_APP_ID}
      REVERB_APP_KEY: ${REVERB_APP_KEY}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET}
      REVERB_HOST: reverb
      REVERB_PORT: 8080
      REVERB_SCHEME: http
    volumes:
      - .:/var/www
    depends_on:
      database:
        condition: service_healthy
    networks:
      - jikokujo

  database:
    image: mysql:9.6.0
    container_name: database
    command: --restrict-fk-on-non-standard-key=OFF
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_ALLOW_EMPTY_PASSWORD: true
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - database-volume:/var/lib/mysql
    networks:
      - jikokujo
  
  nginx:
    image: nginx:1.29.5
    container_name: nginx
    restart: unless-stopped
    ports:
      - 8000:80
    depends_on:
      reverb:
        condition: service_started
      app:
        condition: service_healthy
    volumes:
      - .:/var/www
      - ./docker-compose/nginx:/etc/nginx/conf.d
    networks:
      - jikokujo

  reverb:
    image: local/jikokujo-reverb
    container_name: reverb
    environment:
      REVERB_APP_ID: ${REVERB_APP_ID}
      REVERB_APP_KEY: ${REVERB_APP_KEY}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET}
      DB_HOST: ${DB_HOST}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    build:
      context: ./
      dockerfile: docker-compose/laravel/dependants/Dockerfile
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - .:/var/www
    command: php /var/www/artisan reverb:start --host=0.0.0.0 --port=${REVERB_PORT} --debug
    ports:
    - "8080:8080"
    networks:
      - jikokujo

  poller:
    image: local/jikokujo-poller
    container_name: poller
    build:
      context: ./
      dockerfile: docker-compose/laravel/dependants/Dockerfile
    restart: unless-stopped
    command: php /var/www/artisan poller:run
    environment:
      DB_HOST: ${DB_HOST}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      BKK_API_KEY: ${BKK_API_KEY}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - .:/var/www
    depends_on:
      redis:
        condition: service_started
      app:
        condition: service_healthy
    networks:
      - jikokujo

  redis:
    image: redis:alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - 6379:6379
    networks:
      - jikokujo

  scheduler:
    image: local/jikokujo-scheduler
    container_name: scheduler
    build:
      context: .
      dockerfile: docker-compose/laravel/dependants/Dockerfile
    command: php artisan schedule:work
    volumes:
      - .:/var/www
    working_dir: /var/www
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    environment:
      DB_HOST: ${DB_HOST}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    networks:
      - jikokujo

  job-queue:
    image: local/jikokujo-job-queue
    container_name: job-queue
    build:
      context: .
      dockerfile: docker-compose/laravel/dependants/Dockerfile
    command: php artisan queue:work --sleep=1 --tries=3 --timeout=120
    volumes:
      - .:/var/www
    working_dir: /var/www
    depends_on:
      database:
        condition: service_healthy
      app:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    environment:
      DB_HOST: ${DB_HOST}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    networks:
      - jikokujo

networks:
  jikokujo:
    driver: bridge

volumes:
  database-volume: