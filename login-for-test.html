<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        body { font-family: Arial, sans-serif; background:#f4f6f9; display:flex; align-items:center; justify-content:center; height:100vh; }
        .login-box { background:white; padding:30px; border-radius:8px; width:320px; box-shadow:0 0 10px rgba(0,0,0,0.1); }
        input { width:100%; padding:10px; margin-bottom:12px; border:1px solid #ccc; border-radius:4px; }
        button { width:100%; padding:10px; background:#3490dc; color:white; border:none; border-radius:4px; cursor:pointer; }
        button:hover { background:#2779bd; }
        #error { color:red; margin-bottom:10px; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Login</h2>
    <div id="error"></div>

    <form id="loginForm">
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
</div>

<script>
    document.getElementById("loginForm").addEventListener("submit", async function(e) {
        e.preventDefault();
    
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const errorEl = document.getElementById("error");
    
        try {
            const response = await fetch('http://localhost:8000/api/user/login/false', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json',
                },
                body: JSON.stringify({ email, password })
            });
    
            const text = await response.text();
            console.log("Status:", response.status);
            console.log("Raw response:", text);
    
            let data;
            try {
                data = JSON.parse(text);
            } catch (e) {
                errorEl.innerText = "Server returned non-JSON response (check console)";
                return;
            }
    
            if (response.ok) {
                const token = data.data?.token;
                if (token) {
                    localStorage.setItem('auth_token', token);
                    console.log("✅ Token saved:", token);
                    window.location.href = "/dashboard";
                } else {
                    errorEl.innerText = "Token not found in response";
                }
            } else {
                errorEl.innerText = data.errors?.[0] || "Login failed";
            }
        } catch (err) {
            console.error(err);
            errorEl.innerText = "Network or server error - check console";
        }
    });
    </script>
</body>
</html>
