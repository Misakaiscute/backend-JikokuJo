<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
}

.login-box{
    background:white;
    padding:30px;
    border-radius:8px;
    width:320px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.login-box h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:10px;
    margin-bottom:12px;
    border:1px solid #ccc;
    border-radius:4px;
}

button{
    width:100%;
    padding:10px;
    background:#3490dc;
    color:white;
    border:none;
    border-radius:4px;
    cursor:pointer;
}

button:hover{
    background:#2779bd;
}

#error{
    color:red;
    margin-bottom:10px;
}
</style>

</head>
<body>

<div class="login-box">
<h2>Login</h2>

<div id="error"></div>

<form id="loginForm">
<input type="email" id="email" placeholder="Email" required>
<input type="password" id="password" placeholder="Password" required>

<button type="submit">Login</button>
</form>
</div>

<script>
document.getElementById("loginForm").addEventListener("submit", async function(e){
    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {

        // Required for Sanctum SPA authentication
        await fetch("http://localhost:8000/sanctum/csrf-cookie", {
            credentials: "include"
        });

        const response = await fetch('http://localhost:8000/api/user/login/false',{
            method:'POST',
            headers:{
                'Content-Type':'application/json',
                'Accept':'application/json'
            },
            credentials:'include',
            body: JSON.stringify({
                email: email,
                password: password
            })
        });

        const data = await response.json();

        if(response.ok){
            window.location.href = "/dashboard";
        }else{
            document.getElementById("error").innerText = data.message || "Login failed";
        }

    } catch(err){
        document.getElementById("error").innerText = "Server error";
    }

});
</script>

</body>
</html>
